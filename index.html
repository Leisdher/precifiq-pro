<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precifiq PRO | Dashboard Sênior Lezari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: '#10B981', darkbg: '#0F172A', darkcard: '#1E293B', darkborder: '#334155' } } }
        }
    </script>
    <style>
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-darkbg text-gray-100 font-sans text-sm min-h-screen">

    <header class="bg-darkcard border-b border-darkborder sticky top-0 z-50 shadow-md">
        <div class="max-w-screen-2xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i data-lucide="shield-check" class="text-brand w-7 h-7"></i>
                <div>
                    <h1 class="text-xl font-black tracking-tight leading-none">Precifiq <span class="text-brand">PRO</span></h1>
                    <span class="text-[10px] text-gray-400 font-bold tracking-widest uppercase">Donna Martins Intelligence</span>
                </div>
            </div>
            <div class="flex gap-4 items-center">
                <div class="bg-gray-800 rounded-lg p-1 flex border border-darkborder">
                    <button id="btnVarejo" class="px-4 py-1.5 rounded-md text-xs font-bold bg-brand text-white shadow" onclick="setModo('varejo')">VAREJO</button>
                    <button id="btnAtacado" class="px-4 py-1.5 rounded-md text-xs font-bold text-gray-400 hover:text-white" onclick="setModo('atacado')">ATACADO</button>
                </div>
                <button onclick="salvarGeral()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold px-4 py-2 rounded shadow flex items-center gap-2 transition">
                    <i data-lucide="save" class="w-4 h-4"></i> Salvar Tudo
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-screen-2xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <aside class="lg:col-span-3 space-y-6">
            <div class="bg-darkcard rounded-xl p-5 border border-darkborder shadow-lg">
                <h2 class="font-black uppercase text-gray-300 mb-4 flex items-center gap-2 border-b border-darkborder pb-2">
                    <i data-lucide="building" class="w-4 h-4 text-brand"></i> Estrutura da Empresa
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Simples Nacional / Imposto (%)</label>
                        <input type="number" id="g_imposto" value="10.00" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white font-bold mt-1" oninput="calcularTudo()">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Custo Fixo Operacional (%)</label>
                        <input type="number" id="g_custofixo" value="11.29" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white font-bold mt-1" oninput="calcularTudo()">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">Devoluções (%)</label>
                            <input type="number" id="g_devolucao" value="2.00" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white font-bold mt-1" oninput="calcularTudo()">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">Juros Emp. (%)</label>
                            <input type="number" id="g_juros" value="0.00" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white font-bold mt-1" oninput="calcularTudo()">
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-darkcard rounded-xl p-5 border border-darkborder shadow-lg border-l-4 border-l-brand">
                <h2 class="font-black uppercase text-brand mb-4 flex items-center gap-2 border-b border-darkborder pb-2">
                    <i data-lucide="package" class="w-4 h-4"></i> Custo do Produto / Kit
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Custo de Fábrica (R$ unitário)</label>
                        <input type="number" id="p_custo" value="25.00" class="w-full bg-gray-900 border border-brand text-xl rounded p-2 text-white font-black mt-1" oninput="calcularTudo()">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">Embalagem (R$)</label>
                            <input type="number" id="p_embalagem" value="1.50" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white font-bold mt-1" oninput="calcularTudo()">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-brand uppercase">Qtd (Formar Kit)</label>
                            <input type="number" id="p_qtd" value="1" class="w-full bg-brand/20 border border-brand rounded p-2 text-brand font-black mt-1" oninput="calcularTudo()">
                        </div>
                    </div>
                    <hr class="border-darkborder">
                    <div>
                        <label class="text-xs font-black text-white uppercase">Margem de Lucro Desejada (%)</label>
                        <input type="number" id="p_lucro" value="20.00" class="w-full bg-green-900/30 border border-green-500 rounded p-2 text-green-400 text-lg font-black mt-1 text-center" oninput="calcularTudo()">
                    </div>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-9 space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4" id="cardsPlataformas">
                </div>

            <div class="bg-darkcard rounded-xl p-5 border border-darkborder shadow-lg">
                <h2 class="font-black uppercase text-gray-300 mb-4 flex items-center gap-2"><i data-lucide="bar-chart-2" class="w-5 h-5 text-brand"></i> Comparativo de Lucro Líquido (R$)</h2>
                <div class="h-64 w-full">
                    <canvas id="lucroChart"></canvas>
                </div>
            </div>

        </section>
    </main>

    <script>
        lucide.createIcons();
        let chartInstance = null;
        let modoAtual = 'varejo'; // ou atacado

        function setModo(modo) {
            modoAtual = modo;
            document.getElementById('btnVarejo').className = modo === 'varejo' ? 'px-4 py-1.5 rounded-md text-xs font-bold bg-brand text-white shadow' : 'px-4 py-1.5 rounded-md text-xs font-bold text-gray-400 hover:text-white';
            document.getElementById('btnAtacado').className = modo === 'atacado' ? 'px-4 py-1.5 rounded-md text-xs font-bold bg-brand text-white shadow' : 'px-4 py-1.5 rounded-md text-xs font-bold text-gray-400 hover:text-white';
            calcularTudo();
        }

        // Banco de Dados Editável Sênior
        let plataformas = [
            { id: 'meli', nome: 'Mercado Livre', cor: 'border-yellow-400', text: 'text-yellow-400', comissao: 12, taxaFixa: 0, afliado: 0, antecipacao: 0, ads: 0 },
            { id: 'shopee', nome: 'Shopee', cor: 'border-orange-500', text: 'text-orange-500', comissao: 20, taxaFixa: 4, afliado: 0, antecipacao: 0, ads: 0 },
            { id: 'amazon', nome: 'Amazon', cor: 'border-blue-500', text: 'text-blue-500', comissao: 14, taxaFixa: 5, afliado: 0, antecipacao: 0, ads: 0 },
            { id: 'shein', nome: 'Shein', cor: 'border-gray-300', text: 'text-gray-300', comissao: 16, taxaFixa: 4, afliado: 0, antecipacao: 0, ads: 0 },
            { id: 'tiktok', nome: 'TikTok Shop', cor: 'border-pink-500', text: 'text-pink-500', comissao: 12, taxaFixa: 4, afliado: 5, antecipacao: 0, ads: 0 },
            { id: 'direta', nome: 'Venda Direta / Site', cor: 'border-brand', text: 'text-brand', comissao: 4, taxaFixa: 0, afliado: 0, antecipacao: 0, ads: 0 }
        ];

        // Carrega dados salvos no PC
        function carregarDados() {
            const salvos = localStorage.getItem('precifiq_dados');
            if(salvos) {
                const data = JSON.parse(salvos);
                document.getElementById('g_imposto').value = data.g_imposto;
                document.getElementById('g_custofixo').value = data.g_custofixo;
                document.getElementById('g_devolucao').value = data.g_devolucao;
                document.getElementById('g_juros').value = data.g_juros;
                if(data.plataformas) plataformas = data.plataformas;
            }
        }

        function salvarGeral() {
            const data = {
                g_imposto: document.getElementById('g_imposto').value,
                g_custofixo: document.getElementById('g_custofixo').value,
                g_devolucao: document.getElementById('g_devolucao').value,
                g_juros: document.getElementById('g_juros').value,
                plataformas: plataformas
            };
            localStorage.setItem('precifiq_dados', JSON.stringify(data));
            alert("Inteligência da Donna Martins salva com sucesso na sua máquina!");
        }

        // Atualiza variável do array
        function atualizarPlataforma(id, campo, valor) {
            const p = plataformas.find(x => x.id === id);
            if(p) {
                p[campo] = parseFloat(valor) || 0;
                calcularTudo();
            }
        }

        function toggleBreakdown(id) {
            const el = document.getElementById(`breakdown_${id}`);
            el.classList.toggle('hidden');
        }

        function formatMoney(val) {
            return val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function calcularTudo() {
            const container = document.getElementById('cardsPlataformas');
            container.innerHTML = '';
            let chartLabels = [];
            let chartData = [];

            // Puxar Estrutura Global
            const imposto = (parseFloat(document.getElementById('g_imposto').value) || 0) / 100;
            const custofixo = (parseFloat(document.getElementById('g_custofixo').value) || 0) / 100;
            const devolucao = (parseFloat(document.getElementById('g_devolucao').value) || 0) / 100;
            const juros = (parseFloat(document.getElementById('g_juros').value) || 0) / 100;
            const empresaTotalPerc = imposto + custofixo + devolucao + juros;

            // Produto
            const custoBase = parseFloat(document.getElementById('p_custo').value) || 0;
            const embalagem = parseFloat(document.getElementById('p_embalagem').value) || 0;
            const qtd = parseInt(document.getElementById('p_qtd').value) || 1;
            const margemDesejada = (parseFloat(document.getElementById('p_lucro').value) || 0) / 100;

            const custoTotalFabrica = (custoBase * qtd) + embalagem;

            plataformas.forEach(plat => {
                // Se Atacado, taxa fixa é cobrada 1x. Se Varejo (Kits), taxa fixa multiplica pela Qtd (Regra Shopee/Meli)
                const taxaFixaReal = modoAtual === 'atacado' ? plat.taxaFixa : (plat.taxaFixa * qtd);
                
                const comissaoPerc = plat.comissao / 100;
                const afiliadoPerc = plat.afliado / 100;
                const antecipacaoPerc = plat.antecipacao / 100;
                const adsPerc = plat.ads / 100;

                const platTotalPerc = comissaoPerc + afiliadoPerc + antecipacaoPerc + adsPerc;
                
                // Engenharia do Preço Sugerido (Mark-up Divisor)
                const divisor = 1 - (empresaTotalPerc + platTotalPerc + margemDesejada);
                let precoSugerido = 0;
                let lucroSugerido = 0;

                if (divisor > 0) {
                    precoSugerido = (custoTotalFabrica + taxaFixaReal) / divisor;
                    lucroSugerido = precoSugerido * margemDesejada;
                }

                // Engenharia do Simulador Livre (Se eu vender por X, qual o lucro?)
                const inputSimulador = document.getElementById(`sim_${plat.id}`);
                let precoSimulado = inputSimulador ? parseFloat(inputSimulador.value) : precoSugerido;
                if(isNaN(precoSimulado) || precoSimulado === 0) precoSimulado = precoSugerido;

                const descontoEmpresaR = precoSimulado * empresaTotalPerc;
                const descontoPlatR = (precoSimulado * platTotalPerc) + taxaFixaReal;
                const lucroSimulado = precoSimulado - custoTotalFabrica - descontoEmpresaR - descontoPlatR;
                const roiSimulado = custoTotalFabrica > 0 ? (lucroSimulado / custoTotalFabrica) * 100 : 0;

                const isLucroNegativo = lucroSimulado < 0;

                // Salvar dados pro gráfico
                chartLabels.push(plat.nome);
                chartData.push(lucroSugerido);

                // Montar o Card Dinâmico HTML
                let cardHTML = `
                <div class="bg-gray-900 rounded-xl border-t-4 ${plat.cor} border-x border-b border-darkborder shadow flex flex-col overflow-hidden">
                    <div class="p-3 bg-gray-800 border-b border-darkborder flex justify-between items-center">
                        <h3 class="font-black uppercase ${plat.text} text-sm">${plat.nome}</h3>
                    </div>
                    
                    <div class="p-3 grid grid-cols-4 gap-2 border-b border-darkborder bg-gray-900/50">
                        <div><label class="text-[9px] font-bold text-gray-400 uppercase">Comissão(%)</label><input type="number" onchange="atualizarPlataforma('${plat.id}','comissao',this.value)" value="${plat.comissao}" class="w-full bg-gray-800 text-xs p-1 mt-1 border border-gray-700 rounded text-center"></div>
                        <div><label class="text-[9px] font-bold text-gray-400 uppercase">Fixo(R$)</label><input type="number" onchange="atualizarPlataforma('${plat.id}','taxaFixa',this.value)" value="${plat.taxaFixa}" class="w-full bg-gray-800 text-xs p-1 mt-1 border border-gray-700 rounded text-center"></div>
                        <div><label class="text-[9px] font-bold text-gray-400 uppercase">Afiliado(%)</label><input type="number" onchange="atualizarPlataforma('${plat.id}','afliado',this.value)" value="${plat.afliado}" class="w-full bg-gray-800 text-xs p-1 mt-1 border border-gray-700 rounded text-center"></div>
                        <div><label class="text-[9px] font-bold text-gray-400 uppercase">Antecipa(%)</label><input type="number" onchange="atualizarPlataforma('${plat.id}','antecipacao',this.value)" value="${plat.antecipacao}" class="w-full bg-gray-800 text-xs p-1 mt-1 border border-gray-700 rounded text-center"></div>
                    </div>

                    <div class="p-4 bg-gray-900 text-center">
                        <p class="text-[10px] uppercase font-bold text-gray-500 mb-1">Preço Sugerido (Meta ${document.getElementById('p_lucro').value}%)</p>
                        <p class="text-2xl font-black ${divisor <= 0 ? 'text-red-500' : 'text-white'}">
                            ${divisor > 0 ? formatMoney(precoSugerido) : 'Impossível (Ajuste Taxas)'}
                        </p>
                        <button onclick="toggleBreakdown('${plat.id}')" class="text-[10px] text-brand hover:underline mt-2 flex items-center justify-center gap-1 w-full"><i data-lucide="search" class="w-3 h-3"></i> Ver Extrato Detalhado</button>
                        
                        <div id="breakdown_${plat.id}" class="hidden mt-3 text-left bg-gray-800 p-3 rounded text-[10px] space-y-1 font-mono border border-gray-700">
                            <div class="flex justify-between text-gray-400"><span>Preço Venda:</span> <span>${formatMoney(precoSugerido)}</span></div>
                            <div class="flex justify-between text-red-400"><span>Custo Produto:</span> <span>- ${formatMoney(custoTotalFabrica)}</span></div>
                            <div class="flex justify-between text-red-400"><span>Impostos/Despesas (${(empresaTotalPerc*100).toFixed(1)}%):</span> <span>- ${formatMoney(precoSugerido * empresaTotalPerc)}</span></div>
                            <div class="flex justify-between text-red-400"><span>Plataforma (${(platTotalPerc*100).toFixed(1)}% + Fixa):</span> <span>- ${formatMoney((precoSugerido * platTotalPerc) + taxaFixaReal)}</span></div>
                            <hr class="border-gray-600 my-1">
                            <div class="flex justify-between text-brand font-bold text-xs"><span>Lucro Limpo:</span> <span>${formatMoney(lucroSugerido)}</span></div>
                        </div>
                    </div>

                    <div class="p-4 border-t border-darkborder bg-darkcard">
                        <p class="text-[10px] uppercase font-bold text-gray-400 mb-2"><i data-lucide="calculator" class="w-3 h-3 inline"></i> Simulador Manual</p>
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-xs font-bold text-gray-500">R$</span>
                            <input type="number" id="sim_${plat.id}" value="${precoSimulado > 0 ? precoSimulado.toFixed(2) : ''}" oninput="calcularTudo()" placeholder="Digite seu preço..." class="w-full bg-gray-800 border border-gray-600 rounded p-1.5 text-sm text-white font-bold outline-none focus:border-brand">
                        </div>
                        <div class="flex justify-between items-center bg-gray-900 p-2 rounded border ${isLucroNegativo ? 'border-red-500/50' : 'border-gray-700'}">
                            <div>
                                <p class="text-[9px] uppercase font-bold text-gray-500">Lucro Simulado</p>
                                <p class="text-sm font-black ${isLucroNegativo ? 'text-red-500' : 'text-brand'}">${formatMoney(lucroSimulado)}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] uppercase font-bold text-gray-500">ROI (%)</p>
                                <p class="text-xs font-bold ${isLucroNegativo ? 'text-red-500' : 'text-gray-300'}">${roiSimulado.toFixed(1)}%</p>
                            </div>
                        </div>
                    </div>
                </div>`;
                container.innerHTML += cardHTML;
            });
            
            lucide.createIcons();
            atualizarGrafico(chartLabels, chartData);
        }

        function atualizarGrafico(labels, data) {
            const ctx = document.getElementById('lucroChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Lucro Líquido Sugerido (R$)',
                        data: data,
                        backgroundColor: '#10B981',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94A3B8' } },
                        x: { grid: { display: false }, ticks: { color: '#94A3B8', font: {size: 10} } }
                    }
                }
            });
        }

        // Init
        carregarDados();
        calcularTudo();
    </script>
</body>
</html>
